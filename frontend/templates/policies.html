{% extends "base.html" %} {% block content %} {% load static %}

<h2>Policy Management</h2>
<button class="btn btn-primary mb-3" onclick="showForm()">Create Policy</button>

<div id="policy-list"></div>

<!-- form -->
<div id="form" class="card p-3 mt-3" style="display: none">
  <input type="hidden" id="policy-id" />

  <div class="mb-2">
    <label>Context</label>
    <select id="context" class="form-select"></select>
  </div>

  <div class="mb-2">
    <label>Requester Type</label>
    <select id="requester_type" class="form-select"></select>
  </div>

  <hr />

  <!-- visibility rules -->
  <h5>Visibility Rules</h5>
  <div class="form-check">
    <input type="checkbox" id="display_name" class="form-check-input" />
    <label class="form-check-label">Display Name</label>
  </div>

  <div class="form-check">
    <input type="checkbox" id="email" class="form-check-input" />
    <label class="form-check-label">Email</label>
  </div>

  <div class="form-check">
    <input type="checkbox" id="phone" class="form-check-input" />
    <label class="form-check-label">Phone</label>
  </div>

  <div class="form-check">
    <input type="checkbox" id="job_title" class="form-check-input" />
    <label class="form-check-label">Job Title</label>
  </div>

  <div class="form-check">
    <input type="checkbox" id="linkedin" class="form-check-input" />
    <label class="form-check-label">LinkedIn</label>
  </div>

  <div class="form-check">
    <input type="checkbox" id="social_media" class="form-check-input" />
    <label class="form-check-label">Social Media</label>
  </div>

  <hr />

  <button class="btn btn-success" onclick="savePolicy()">Save</button>
  <button class="btn btn-secondary" onclick="hideForm()">Cancel</button>
</div>

{% endblock %} {% block scripts %}
<script src="{% static 'frontend/js/policies.js' %}" defer></script>
{% endblock %}
