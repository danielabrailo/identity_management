{% extends "base.html" %} {% block content %}

<h2>Context Profiles</h2>
<button class="btn btn-primary mb-3" onclick="showCreateForm()">
  Create Context Profile
</button>

<div id="context-list"></div>

<!-- create profile form -->
<div id="form-container" style="display: none" class="card p-3 mt-3">
  <h5 id="form-title">Create Profile</h5>
  <input type="hidden" id="profile-id" />
  <div class="mb-2">
    <label>Context ID</label>
    <select id="context" class="form-select"></select>
  </div>
  <div class="mb-2">
    <label>Display Name</label>
    <input id="display_name" class="form-control" />
  </div>
  <div class="mb-2">
    <label>Email</label>
    <input id="email" class="form-control" />
  </div>
  <div class="mb-2">
    <label>Phone</label>
    <input id="phone" class="form-control" />
  </div>
  <div class="mb-2">
    <label>Job Title</label>
    <input id="job_title" class="form-control" />
  </div>
  <div class="mb-2">
    <label>LinkedIn</label>
    <input id="linkedin" class="form-control" />
  </div>

  <button class="btn btn-success" onclick="saveProfile()">Save</button>
  <button class="btn btn-secondary" onclick="hideForm()">Cancel</button>
</div>

<script>
  const API = "/api/context-profiles/";
  const CONTEXT_API = "/api/contexts/";

  function getToken() {
    // session auth already handles cookies automatically
    return null;
  }

  function getCSRFToken() {
    return document.querySelector("[name=csrfmiddlewaretoken]").value;
  }

  async function loadContexts() {
    const res = await fetch(CONTEXT_API, {
      credentials: "include",
    });

    const data = await res.json();
    const select = document.getElementById("context");
    select.innerHTML = "";

    data.forEach((c) => {
      const option = document.createElement("option");
      option.value = c.id;
      option.textContent = c.name;
      select.appendChild(option);
    });
  }

  //load the profiles and attach to HTML
  async function loadProfiles() {
    const res = await fetch(API);
    const data = await res.json();

    let html = "<table class='table'>";
    html += "<tr><th>Context</th><th>Display Name</th><th>Actions</th></tr>";

    data.forEach((p) => {
      html += `
            <tr>
                <td>${p.context_name}</td>
                <td>${p.display_name}</td>
                <td>
                    <button class="btn btn-sm btn-primary" onclick="editProfile(${p.id})">Edit</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteProfile(${p.id})">Delete</button>
                </td>
            </tr>
        `;
    });

    html += "</table>";

    document.getElementById("context-list").innerHTML = html;
  }

  function showCreateForm() {
    document.getElementById("form-container").style.display = "block";
    document.getElementById("profile-id").value = "";
  }

  function hideForm() {
    document.getElementById("form-container").style.display = "none";
  }

  async function saveProfile() {
    const id = document.getElementById("profile-id").value;
    const payload = {
      context: document.getElementById("context").value,
      display_name: document.getElementById("display_name").value,
      email: document.getElementById("email").value,
      phone: document.getElementById("phone").value,
      job_title: document.getElementById("job_title").value,
      linkedin: document.getElementById("linkedin").value,
    };

    let method = "POST";
    let url = API;
    if (id) {
      method = "PUT";
      url = API + id + "/";
    }
    await fetch(url, {
      method: method,
      credentials: "include",
      headers: {
        "X-CSRFToken": getCSRFToken(),
        "Content-Type": "application/json",
      },
      body: JSON.stringify(payload),
    });
    hideForm();
    loadProfiles();
  }

  async function editProfile(id) {
    const res = await fetch(API + id + "/");
    const data = await res.json();

    document.getElementById("profile-id").value = data.id;
    document.getElementById("context").value = data.context;
    document.getElementById("display_name").value = data.display_name;
    document.getElementById("email").value = data.email;
    document.getElementById("phone").value = data.phone;
    document.getElementById("job_title").value = data.job_title;
    document.getElementById("linkedin").value = data.linkedin;

    document.getElementById("form-container").style.display = "block";
  }

  async function deleteProfile(id) {
    await fetch(API + id + "/", {
      credentials: "include",
      headers: {
        "X-CSRFToken": getCSRFToken(),
      },
      method: "DELETE",
    });

    loadProfiles();
  }

  loadProfiles();
  loadContexts();
</script>
{% endblock %}
